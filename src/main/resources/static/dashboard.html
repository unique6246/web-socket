<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://stackpath.bootstrapcdn.com; style-src 'self' 'unsafe-inline' https://stackpath.bootstrapcdn.com; connect-src 'self'; img-src 'self' data:; font-src 'self' https://stackpath.bootstrapcdn.com; object-src 'none'; frame-ancestors 'none';">
  <title>Admin Dashboard – ChatApp</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    .badge-admin { background:#dc3545; color:#fff; padding:2px 8px; border-radius:4px; font-size:.75em; }
    .badge-moderator { background:#fd7e14; color:#fff; padding:2px 8px; border-radius:4px; font-size:.75em; }
    .badge-user { background:#0d6efd; color:#fff; padding:2px 8px; border-radius:4px; font-size:.75em; }
    .stat-card { border:1px solid #dee2e6; border-radius:8px; padding:16px; text-align:center; }
    .stat-card h3 { font-size:2rem; margin:0; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">🛡 Admin Dashboard</span>
  <div>
    <a href="/api/v1/chat" class="btn btn-outline-light btn-sm mr-2">← Chat</a>
    <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container mt-4">

  <!-- Statistics Section -->
  <section class="mb-4">
    <h4>📊 Statistics</h4>
    <div class="row" id="statsRow">
      <div class="col-md-4"><div class="stat-card"><h3 id="statUsers">–</h3><p>Total Users</p></div></div>
      <div class="col-md-4"><div class="stat-card"><h3 id="statRooms">–</h3><p>Total Chat Rooms</p></div></div>
      <div class="col-md-4"><div class="stat-card"><h3 id="statMessages">–</h3><p>Total Messages</p></div></div>
    </div>
  </section>

  <hr>

  <!-- User Management Section -->
  <section class="mb-4">
    <h4>👤 Manage Users</h4>
    <button class="btn btn-primary btn-sm mb-2" onclick="fetchUsers()">🔄 Refresh Users</button>
    <table class="table table-bordered table-hover table-sm" id="usersTable">
      <thead class="thead-dark">
        <tr><th>ID</th><th>Username</th><th>Email</th><th>Roles</th><th>Actions</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <h5 class="mt-3">Add New User</h5>
    <form onsubmit="createUser(event)" class="form-inline">
      <input type="text"     id="newUserName"     class="form-control mr-2 mb-2" placeholder="Username"  required>
      <input type="email"    id="newUserEmail"    class="form-control mr-2 mb-2" placeholder="Email"     required>
      <input type="password" id="newUserPassword" class="form-control mr-2 mb-2" placeholder="Password"  required>
      <select id="newUserRole" class="form-control mr-2 mb-2">
        <option value="USER">USER</option>
        <option value="MODERATOR">MODERATOR</option>
        <option value="ADMIN">ADMIN</option>
      </select>
      <button type="submit" class="btn btn-success mb-2">Add User</button>
    </form>
  </section>

  <hr>

  <!-- Chat Room Management Section -->
  <section class="mb-4">
    <h4>💬 Manage Chat Rooms</h4>
    <button class="btn btn-primary btn-sm mb-2" onclick="fetchChatRooms()">🔄 Refresh Rooms</button>
    <table class="table table-bordered table-hover table-sm" id="chatRoomsTable">
      <thead class="thead-dark">
        <tr><th>ID</th><th>Room Name</th><th>Members</th><th>Actions</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <h5 class="mt-3">Create New Chat Room</h5>
    <form onsubmit="createChatRoom(event)" class="form-inline">
      <input type="text" id="newChatRoomName" class="form-control mr-2 mb-2" placeholder="Room Name" required>
      <button type="submit" class="btn btn-success mb-2">Create Room</button>
    </form>
  </section>

</div>

<script>
  // ── Server-side Admin Guard ──────────────────
  // Uses HttpOnly cookie — no token in JS anywhere.
  (async function guardDashboard() {
    try {
      const res = await fetch("/api/auth/me", { credentials: "include" });
      if (!res.ok) {
        sessionStorage.removeItem("username");
        sessionStorage.removeItem("roles");
        window.location.href = "/api/v1/login";
        return;
      }
      const data = await res.json();
      const roles = data.roles || [];
      sessionStorage.setItem("roles",    JSON.stringify(roles));
      sessionStorage.setItem("username", data.username);

      if (!roles.includes("ROLE_ADMIN")) {
        alert("Access denied. Admin only.");
        window.location.href = "/api/v1/login";
        return;
      }
      if (document.readyState !== "loading") {
        fetchStats(); fetchUsers(); fetchChatRooms();
      } else {
        document.addEventListener("DOMContentLoaded", function () {
          fetchStats(); fetchUsers(); fetchChatRooms();
        });
      }
    } catch (e) {
      sessionStorage.removeItem("username");
      sessionStorage.removeItem("roles");
      window.location.href = "/api/v1/login";
    }
  })();

  const baseUrl = "/admin";

  function logout() {
    // POST to server — HttpOnly cookie is sent automatically, server blacklists it and clears cookie
    fetch("/api/auth/logout", { method: "POST", credentials: "include" })
      .finally(() => {
        sessionStorage.removeItem("username");
        sessionStorage.removeItem("roles");
        window.location.href = "/api/v1/login";
      });
  }

  async function authFetch(url, options = {}) {
    // No Authorization header — cookie is sent automatically
    options.credentials = "include";
    options.headers = { ...options.headers, "Content-Type": "application/json" };
    const res = await fetch(url, options);
    if (res.status === 401 || res.status === 403) {
      alert("Session expired or unauthorized. Redirecting to login.");
      window.location.href = "/api/v1/login";
      return null;
    }
    return res;
  }

  // ── Stats ──────────────────────────────────
  async function fetchStats() {
    const res = await authFetch(`${baseUrl}/stats`);
    if (!res) return;
    const data = await res.json();
    document.getElementById("statUsers").textContent    = data.totalUsers    ?? "–";
    document.getElementById("statRooms").textContent    = data.totalChatRooms ?? "–";
    document.getElementById("statMessages").textContent = data.totalMessages  ?? "–";
  }

  // ── Users ──────────────────────────────────
  async function fetchUsers() {
    const res = await authFetch(`${baseUrl}/users`);
    if (!res) return;
    const users = await res.json();
    const tbody = document.querySelector("#usersTable tbody");
    tbody.innerHTML = "";
    users.forEach(user => {
      const roleBadges = (user.roles || []).map(r =>
        `<span class="badge-${r.name.toLowerCase()}">${r.name}</span>`
      ).join(" ");
      tbody.insertAdjacentHTML("beforeend", `
        <tr>
          <td>${user.id}</td>
          <td>${user.username}</td>
          <td>${user.email ? `<a href="mailto:${user.email}">${user.email}</a>` : '<span class="text-muted">—</span>'}</td>
          <td>${roleBadges}</td>
          <td>
            <select id="roleSelect_${user.id}" class="form-control form-control-sm d-inline" style="width:130px">
              <option value="USER">USER</option>
              <option value="MODERATOR">MODERATOR</option>
              <option value="ADMIN">ADMIN</option>
            </select>
            <button class="btn btn-success btn-sm" onclick="assignRole('${user.username}', '${user.id}')">+Role</button>
            <button class="btn btn-warning btn-sm" onclick="removeRole('${user.username}', '${user.id}')">-Role</button>
            <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})">Delete</button>
          </td>
        </tr>`);
    });
  }

  async function createUser(event) {
    event.preventDefault();
    const username  = document.getElementById("newUserName").value.trim();
    const email     = document.getElementById("newUserEmail").value.trim();
    const password  = document.getElementById("newUserPassword").value;
    const roleToSet = document.getElementById("newUserRole").value;

    if (!email) { alert("Email is required."); return; }

    // Register user (gets USER role by default)
    const res = await authFetch(`${baseUrl}/users`, {
      method: "POST",
      body: JSON.stringify({ username, email, password })
    });
    if (!res) return;
    if (res.ok) {
      // If not USER role, also assign the selected role
      if (roleToSet !== "USER") {
        await authFetch(`${baseUrl}/users/${username}/roles/assign`, {
          method: "PUT",
          body: JSON.stringify({ role: roleToSet })
        });
      }
      alert("User created successfully!");
      document.getElementById("newUserName").value = "";
      document.getElementById("newUserEmail").value = "";
      document.getElementById("newUserPassword").value = "";
      fetchUsers();
    } else {
      const msg = await res.text();
      alert("Error creating user: " + msg);
    }
  }

  async function deleteUser(id) {
    if (!confirm("Delete this user?")) return;
    await authFetch(`${baseUrl}/users/${id}`, { method: "DELETE" });
    fetchUsers();
  }

  async function assignRole(username, userId) {
    const role = document.getElementById(`roleSelect_${userId}`).value;
    const res = await authFetch(`${baseUrl}/users/${username}/roles/assign`, {
      method: "PUT",
      body: JSON.stringify({ role })
    });
    if (res && res.ok) { alert(`Role ${role} assigned!`); fetchUsers(); }
    else alert("Failed to assign role.");
  }

  async function removeRole(username, userId) {
    const role = document.getElementById(`roleSelect_${userId}`).value;
    const res = await authFetch(`${baseUrl}/users/${username}/roles/remove`, {
      method: "PUT",
      body: JSON.stringify({ role })
    });
    if (res && res.ok) { alert(`Role ${role} removed!`); fetchUsers(); }
    else alert("Failed to remove role.");
  }

  // ── Chat Rooms ─────────────────────────────
  async function fetchChatRooms() {
    const res = await authFetch(`${baseUrl}/chatrooms`);
    if (!res) return;
    const rooms = await res.json();
    const tbody = document.querySelector("#chatRoomsTable tbody");
    tbody.innerHTML = "";
    rooms.forEach(room => {
      const memberCount = room.chatRoomUsers ? room.chatRoomUsers.length : "–";
      tbody.insertAdjacentHTML("beforeend", `
        <tr>
          <td>${room.id}</td>
          <td>${room.roomName}</td>
          <td>${memberCount}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="deleteChatRoom(${room.id})">Delete</button>
          </td>
        </tr>`);
    });
  }

  async function createChatRoom(event) {
    event.preventDefault();
    const roomName = document.getElementById("newChatRoomName").value;
    const res = await authFetch(`${baseUrl}/chatrooms`, {
      method: "POST",
      body: JSON.stringify({ roomName })
    });
    if (res && res.ok) {
      alert("Chat room created!");
      document.getElementById("newChatRoomName").value = "";
      fetchChatRooms();
    } else {
      alert("Error creating chat room.");
    }
  }

  async function deleteChatRoom(id) {
    if (!confirm("Delete this chat room?")) return;
    await authFetch(`${baseUrl}/chatrooms/${id}`, { method: "DELETE" });
    fetchChatRooms();
  }

  // ── Init is handled in the guard above ──
</script>
</body>
</html>
